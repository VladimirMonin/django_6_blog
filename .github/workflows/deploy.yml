name: Deploy production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv lock --check
      - run: uv run python manage.py check
      - run: uv run pytest -q tests/test_production_settings.py blog/test_infra.py blog/test_static_delivery.py blog/test_storage_compat.py tests/test_deploy_artifacts.py

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Request exact production deployment
        id: request
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_COMMIT: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          [[ "$DEPLOY_COMMIT" =~ ^[a-f0-9]{40}$ ]]
          payload=$(jq -n \
            --arg ref "$DEPLOY_COMMIT" \
            '{ref: $ref, environment: "production", task: "deploy", auto_merge: false, required_contexts: [], description: "Timeweb pull deployment", payload: {transport: "timeweb-pull-v1"}}')
          response=$(gh api \
            --method POST \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$REPOSITORY/deployments" \
            --input - <<<"$payload")
          deployment_id=$(jq -er '.id | select(type == "number")' <<<"$response")
          echo "deployment_id=$deployment_id" >>"$GITHUB_OUTPUT"

      - name: Wait for VPS deployment result
        env:
          DEPLOYMENT_ID: ${{ steps.request.outputs.deployment_id }}
          DEPLOY_COMMIT: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 120); do
            status_json=$(curl --fail --silent --show-error \
              --connect-timeout 10 --max-time 20 \
              https://exception-blog.ru/_deploy/status || true)
            current_id=$(jq -r '.deployment_id // empty' <<<"$status_json" 2>/dev/null || true)
            current_sha=$(jq -r '.sha // empty' <<<"$status_json" 2>/dev/null || true)
            current_status=$(jq -r '.status // empty' <<<"$status_json" 2>/dev/null || true)
            if [[ "$current_id" == "$DEPLOYMENT_ID" && "$current_sha" == "$DEPLOY_COMMIT" ]]; then
              case "$current_status" in
                success) exit 0 ;;
                failure) echo "VPS deployment failed" >&2; exit 1 ;;
              esac
            fi
            sleep 5
          done
          echo "Timed out waiting for VPS deployment" >&2
          exit 1

      - name: Verify public production endpoints
        run: |
          curl --fail --silent --show-error --max-time 30 https://exception-blog.ru/ >/dev/null
          curl --fail --silent --show-error --max-time 30 https://exception-blog.ru/api/v1/health/live/ >/dev/null
          curl --fail --silent --show-error --max-time 30 https://exception-blog.ru/api/v1/health/ready/ >/dev/null

      - name: Mark GitHub deployment successful
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.request.outputs.deployment_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          jq -n '{state: "success", environment: "production", environment_url: "https://exception-blog.ru/", description: "Timeweb pull deployment passed", auto_inactive: false}' |
            gh api --method POST \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID/statuses" \
              --input - >/dev/null

      - name: Mark GitHub deployment failed
        if: failure() && steps.request.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.request.outputs.deployment_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          jq -n '{state: "failure", environment: "production", environment_url: "https://exception-blog.ru/", description: "Timeweb pull deployment failed", auto_inactive: false}' |
            gh api --method POST \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID/statuses" \
              --input - >/dev/null
