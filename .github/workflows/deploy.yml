name: Deploy production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv lock --check
      - run: uv run python manage.py check
      - run: uv run pytest -q

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0644 ~/.ssh/known_hosts
      - name: Build immutable source archive
        run: |
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_id="${created_at:0:4}${created_at:5:2}${created_at:8:2}T${created_at:11:2}${created_at:14:2}${created_at:17:2}Z-${GITHUB_SHA:0:12}"
          printf 'RELEASE_ID=%s\n' "$release_id" >> "$GITHUB_ENV"
          git archive --format=tar --output="release-$release_id.tar" HEAD
      - name: Upload release source
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          port=${DEPLOY_PORT:-22}
          [[ "$port" =~ ^[0-9]{1,5}$ ]] && ((port >= 1 && port <= 65535))
          scp -P "$port" "release-$RELEASE_ID.tar" \
            "$DEPLOY_USER@$DEPLOY_HOST:/srv/django-6-blog/incoming/release-$RELEASE_ID.tar"
      - name: Activate release through host-owned adapter
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          port=${DEPLOY_PORT:-22}
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$port" =~ ^[0-9]{1,5}$ ]] && ((port >= 1 && port <= 65535))
          ssh -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" \
            sudo -- /usr/local/sbin/django-6-blog-deploy "$RELEASE_ID" "$RELEASE_COMMIT"
